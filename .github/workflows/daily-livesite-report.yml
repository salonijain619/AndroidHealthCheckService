#     MOBILE_LIVESITE_TEAMS_WEBHOOK secret has been created (see TODO below).
#   - report-generator step is a placeholder (Squad CLI / Python runner not yet built).
#
# Cross-reference: .squad/decisions/inbox/doggett-teams-webhook-setup.md
#
# ─────────────────────────────────────────────────────────────────────────────────────────
# TODO(saloni): Before activating this workflow, you need to:
#
#   1. CREATE the Incoming Webhook URL for the Livesite - Mobile Client Teams channel:
#
#      Channel details:
#        Name:       Livesite - Mobile Client
#        Group ID:   a3312108-40d2-4d8d-a401-066749108606
#        Tenant ID:  72f988bf-86f1-41af-91ab-2d7cd011db47
#        Thread ID:  19:uDpMueKuWUKAMPQ1RO5qOzAL_R8Dq-ZJrXTUPxM63ZY1@thread.tacv2
#
#      Option A — Teams Incoming Webhook connector (classic):
#        a. Open the channel in Teams → ⋯ → Connectors → Incoming Webhook → Configure
#        b. Name it (e.g. "Android Livesite Bot") → Create → copy the URL
#        Note: if Connectors is unavailable (being deprecated in newer tenants), use Option B.
#
#      Option B — Power Automate (recommended for newer tenants):
#        a. Create an Automated cloud flow at https://make.powerautomate.com/
#        b. Trigger: "When an HTTP request is received"
#        c. Action: "Post message in a chat or channel" → select Livesite - Mobile Client
#        d. Save → copy the generated HTTP POST URL
#
#   2. STORE the webhook URL as a GitHub Actions secret:
#        Repo → Settings → Secrets and variables → Actions → New repository secret
#        Name:  MOBILE_LIVESITE_TEAMS_WEBHOOK
#        Value: <the webhook URL from step 1>
#
#   3. BUILD the report generator (Squad CLI or Python runner):
#        Replace the placeholder "Generate daily livesite report" step below with the
#        real invocation. The generator must:
#          a. Run Langly's Play Store version pull (com.microsoft.scmx)
#          b. Run Scully's NAAS server-side Kusto queries (wdgvsoprod.westus.kusto.windows.net)
#          c. Run Frohike's Play Vitals NAAS crash/ANR pull (NAAS-as-a-unit)
#          d. Run the ICM collector (tools/icm/icm_collector.py — requires agency CLI + Entra auth;
#             note: interactive Entra auth cannot run in CI without a service principal workaround)
#          e. Run Reyes's report assembly
#          Output: daily-livesite-report-android-YYYY-MM-DD.md at repo root
#
#   4. UNCOMMENT the schedule: block below and commit — GitHub Actions will pick it up.
#
# ─────────────────────────────────────────────────────────────────────────────────────────

name: Daily Android Livesite Report

on:
  workflow_dispatch:
    inputs:
      report_date:
        description: 'Report date (YYYY-MM-DD). Leave blank to use today (UTC).'
        required: false
        default: ''

  # UNCOMMENT when report-generator is ready AND MOBILE_LIVESITE_TEAMS_WEBHOOK secret is created:
  # schedule:
  #   - cron: '0 14 * * 1-5'  # 09:00 ET (14:00 UTC), weekdays only (Mon-Fri)

jobs:
  daily-livesite-report:
    name: Generate and post daily livesite report
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Resolve report date
        id: date
        run: |
          if [ -n "${{ github.event.inputs.report_date }}" ]; then
            echo "date=${{ github.event.inputs.report_date }}" >> $GITHUB_OUTPUT
          else
            echo "date=$(date -u +%Y-%m-%d)" >> $GITHUB_OUTPUT
          fi

      - name: Generate daily livesite report
        # Real invocation per Mulder's architecture decision
        # (.squad/decisions/inbox/mulder-report-generator-architecture.md §1).
        # Cron is still disabled above — enable only after a successful manual
        # workflow_dispatch run with Teams post validated.
        env:
          PLAY_CONSOLE_SA_KEY: ${{ secrets.PLAY_CONSOLE_SA_KEY }}
          KUSTO_AAD_SP_CLIENT_ID: ${{ secrets.KUSTO_AAD_SP_CLIENT_ID }}
          KUSTO_AAD_SP_CLIENT_SECRET: ${{ secrets.KUSTO_AAD_SP_CLIENT_SECRET }}
          KUSTO_AAD_TENANT_ID: ${{ secrets.KUSTO_AAD_TENANT_ID }}
          REPORT_GENERATOR_SKIP_ICM: "1"
        run: |
          REPORT_FILE="daily-livesite-report-android-${{ steps.date.outputs.date }}.md"
          python -m tools.report_generator.cli \
            --date "${{ steps.date.outputs.date }}" \
            --output "$REPORT_FILE"
          echo "REPORT_FILE=${REPORT_FILE}" >> $GITHUB_ENV

      - name: Post report to Livesite - Mobile Client Teams channel
        # Posts the assembled report via Incoming Webhook.
        # Requires secret: MOBILE_LIVESITE_TEAMS_WEBHOOK
        #   (NOT the deep-link URL — see TODO at top of this file for setup steps)
        #
        # Graceful degradation: if the secret is not set, logs a warning and exits 0.
        # The workflow does not fail on missing webhook — Teams posting is best-effort
        # until the secret is confirmed working.
        env:
          TEAMS_WEBHOOK: ${{ secrets.MOBILE_LIVESITE_TEAMS_WEBHOOK }}
        run: |
          if [ -z "${TEAMS_WEBHOOK}" ]; then
            echo "⚠️  MOBILE_LIVESITE_TEAMS_WEBHOOK secret is not set. Skipping Teams post."
            echo "    See .squad/decisions/inbox/doggett-teams-webhook-setup.md for setup steps."
            exit 0
          fi

          REPORT_DATE="${{ steps.date.outputs.date }}"
          REPORT_FILE="daily-livesite-report-android-${REPORT_DATE}.md"

          if [ ! -f "$REPORT_FILE" ]; then
            echo "❌ Report file not found: $REPORT_FILE"
            exit 1
          fi

          # Read report content (truncate to Teams webhook payload limit ~28KB)
          REPORT_CONTENT=$(head -c 20000 "$REPORT_FILE")

          # Post as a MessageCard payload to the Teams Incoming Webhook
          # TODO(saloni): upgrade to Adaptive Card template once report structure is stable
          PAYLOAD=$(jq -n \
            --arg title "Android GSA Livesite Report — ${REPORT_DATE}" \
            --arg text "$REPORT_CONTENT" \
            '{
              "@type": "MessageCard",
              "@context": "https://schema.org/extensions",
              "themeColor": "0076D7",
              "summary": $title,
              "sections": [{
                "activityTitle": $title,
                "activityText": $text
              }]
            }')

          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            "${TEAMS_WEBHOOK}")

          if [ "${HTTP_STATUS}" = "200" ]; then
            echo "✅ Report posted to Livesite - Mobile Client Teams channel."
          else
            echo "❌ Teams post failed with HTTP status: ${HTTP_STATUS}"
            exit 1
          fi

      - name: Commit report to repository
        # Auto-commits the generated report file back to the repo.
        # TODO(saloni): confirm whether auto-commit is desired or if manual commit (via Scribe) is
        #               preferred. If Scribe handles all commits, remove or disable this step.
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          REPORT_FILE="daily-livesite-report-android-${{ steps.date.outputs.date }}.md"
          if [ -f "$REPORT_FILE" ]; then
            git add "$REPORT_FILE"
            if git diff --cached --quiet; then
              echo "No new report content to commit."
            else
              git commit -m "chore: daily livesite report ${{ steps.date.outputs.date }} [automated]"
              git push
            fi
          else
            echo "No report file to commit."
          fi
